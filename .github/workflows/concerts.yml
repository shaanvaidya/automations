name: Weekly Concert Digest

on:
  schedule:
    # 19:00 UTC = 12pm PDT (summer) / 11am PST (winter, no DST auto-adjust on GitHub Actions cron)
    - cron: "0 19 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: concerts
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: concerts
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run digest
        working-directory: concerts
        env:
          CONCERTS_NTFY_TOPIC: ${{ secrets.CONCERTS_NTFY_TOPIC }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
        run: python3 digest.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add concerts/state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "Update concerts state"
            for i in 1 2 3; do
              git push && break
              echo "Push rejected (likely a concurrent commit to master) - rebasing and retrying"
              git pull --rebase
            done
          fi
